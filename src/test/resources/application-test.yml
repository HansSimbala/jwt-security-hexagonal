spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
  jpa:
    hibernate:
      ddl-auto: create-drop

application:
  security:
    jwt:
      secret-key: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RpbmctcHVycG9zZXM=
      expiration: 3600000
      refresh-token:
        expiration: 604800000

rate-limit:
  enabled: false
  login:
    max-requests: 20
    window-minutes: 1
  register:
    max-requests: 5
    window-minutes: 60

tracing:
  enabled: false

management:
  tracing:
    enabled: false
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
